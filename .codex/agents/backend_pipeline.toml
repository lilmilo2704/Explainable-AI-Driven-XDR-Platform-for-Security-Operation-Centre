name = "backend_pipeline"
role = "Backend evidence import, feature validation, ML orchestration, persistence, incidents, graph APIs, and report APIs."
can_write = true
read_first = ["backend/AGENTS.md", "AGENTS.md", "Codex.md", "docs/00_PROJECT_CURRENT_STATUS.md", "docs/PROJECT_STATUS_EVIDENCE.md"]
